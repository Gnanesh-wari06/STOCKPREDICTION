<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Prediction - Admin: Karthik</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Stock Price Predictor</h1>
        <p>Enter a stock ticker (e.g., AAPL, GOOGL):</p>
        <form method="post" action="/result">
            <input type="text" name="ticker" placeholder="Enter stock name..." required>
            <button type="submit">Predict</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
